        - generic [ref=e98]:
          - article [ref=e136]: "问题已明确，可以制定研究计划。[\"子问题1: 使用 search_abstracts 检索 2023-2025 年间关于 LLM Agent 的综述、关键论文和核心概念，以建立研究脉络的初步框架。\", \"子问题2: 使用 search_abstracts 检索 2023-2025 年间 LLM Agent 在特定应用领域（如代码生成、科学发现、机器人控制）的研究进展，以分析其技术扩散路径。\", \"子问题3: 使用 search_abstracts 检索 2023-2025 年间关于 LLM Agent 的架构设计（如规划、工具使用、多智能体协作）的关键技术论文，以梳理其核心能力演进。\", \"子问题4: 使用 search_abstracts 检索 2023-2025 年间关于 LLM Agent 的评估基准、主要挑战与未来方向的文献，以总结其发展现状与趋势。\"]我将使用 search_abstracts 工具来检索 2023-2025 年间关于 LLM Agent 的相关文献。首先，我会搜索综述和关键论文。现在让我使用向量搜索模式来获取更多关于核心概念和关键论文的信息：## 关键发现总结"
          - article [ref=e137]: 基于对2023-2025年间LLM Agent相关文献的检索，我建立了以下研究脉络的初步框架：
          - heading "一、综述文献" [level=3] [ref=e138]
          - list [ref=e139]:
            - listitem [ref=e140]:
              - article [ref=e141]: 《A Survey on the Feedback Mechanism of LLM-based AI Agents》 (IJCAI 2025)
              - list [ref=e142]:
                - listitem [ref=e143]: 系统综述了LLM-based AI agents的反馈机制
                - listitem [ref=e144]: 提出了一个通用框架，涵盖现有大部分工作
                - listitem [ref=e145]: 对反馈机制进行了分类和深入探讨
            - listitem [ref=e146]:
              - article [ref=e147]: "《Position: Foundation Agents as the Paradigm Shift for Decision Making》 (ICML 2024)"
              - list [ref=e148]:
                - listitem [ref=e149]: 倡导构建基础智能体作为决策学习的范式转变
                - listitem [ref=e150]: 基于大语言模型成功经验，提出了基础智能体的基本特征和挑战
          - heading "二、关键论文" [level=3] [ref=e151]
          - list [ref=e152]:
            - listitem [ref=e153]:
              - article [ref=e154]: "《AgentBench: Evaluating LLMs as Agents》 (ICLR 2024, 引用40)"
              - list [ref=e155]:
                - listitem [ref=e156]: 提出了一个多维基准测试，包含8个不同环境
                - listitem [ref=e157]: 评估了29个API-based和开源LLM作为智能体的能力
                - listitem [ref=e158]: 发现商业LLM在复杂环境中表现强劲，但与开源模型存在显著差距
            - listitem [ref=e159]:
              - article [ref=e160]: 《Watch Out for Your Agents! Investigating Backdoor Threats to LLM-Based Agents》 (NeurIPS 2024, 引用7)
              - list [ref=e161]:
                - listitem [ref=e162]: 首次研究了LLM-based agents的后门攻击威胁
                - listitem [ref=e163]: 提出了智能体后门攻击的一般框架
            - listitem [ref=e164]:
              - article [ref=e165]: 《Multi-agent Architecture Search via Agentic Supernet》 (ICML 2025)
              - list [ref=e166]:
                - listitem [ref=e167]: 提出了agentic supernet概念，一种概率和连续的智能体架构分布
                - listitem [ref=e168]: 引入了MaAS框架，根据查询动态采样智能体架构
          - heading "三、核心概念与研究脉络" [level=3] [ref=e169]
          - heading "1. 智能体架构与框架" [level=4] [ref=e170]
          - list [ref=e171]:
            - listitem [ref=e172]: 多智能体系统：通过协作扩展个体智能体的认知边界
            - listitem [ref=e173]: 智能体框架：如AutoML-Agent、MM-Agent、RepoAudit等专用框架
            - listitem [ref=e174]: 架构搜索：从静态系统转向动态、查询依赖的架构
          - heading "2. 训练与优化方法" [level=4] [ref=e175]
          - list [ref=e176]:
            - listitem [ref=e177]: 离线训练：不修改LLM权重的训练范式（函数作为可学习权重）
            - listitem [ref=e178]: 强化学习集成：LLM作为策略教师训练RL智能体
            - listitem [ref=e179]: 分层多轮RL：解决多轮交互中的信用分配和推理问题
          - heading "3. 评估与基准测试" [level=4] [ref=e180]
          - list [ref=e181]:
            - listitem [ref=e182]: AgentBench：综合评估LLM作为智能体的能力
            - listitem [ref=e183]: MM-Bench：专门用于数学建模任务的基准
          - heading "4. 安全与可靠性" [level=4] [ref=e184]
          - list [ref=e185]:
            - listitem [ref=e186]: 后门攻击：智能体特有的安全威胁
            - listitem [ref=e187]: 不确定性量化：需要重新评估LLM智能体的不确定性
          - heading "5. 应用领域" [level=4] [ref=e188]
          - list [ref=e189]:
            - listitem [ref=e190]: 代码审计：RepoAudit用于仓库级代码审计
            - listitem [ref=e191]: 城市移动性：LLM作为城市居民的移动生成框架
            - listitem [ref=e192]: 数学建模：MM-Agent用于现实世界数学建模问题
            - listitem [ref=e193]: AutoML：全流程自动化机器学习
          - heading "四、研究趋势" [level=3] [ref=e194]
          - list [ref=e195]:
            - listitem [ref=e196]: 从单一智能体到多智能体协作
            - listitem [ref=e197]: 从静态架构到动态、自适应架构
            - listitem [ref=e198]: 从单纯提示工程到系统化训练方法
            - listitem [ref=e199]: 从能力评估到安全性和可靠性关注
            - listitem [ref=e200]: 从通用任务到特定领域应用深化
          - article [ref=e201]: 这个初步框架显示LLM Agent研究正在从基础概念探索向系统化、专业化、安全可靠的方向发展，形成了涵盖架构设计、训练方法、评估基准、安全考虑和应用场景的完整研究脉络。
