        - img "Avatar for Assistant" [ref=e39]
        - article [ref=e44]: 你好！我是 AI 科研论文问答助手，支持论文统计查询、内容检索、研究趋势分析和深度调研。
      - article [ref=e56]: 总结 2023-2025 年 LLM Agent 的研究脉络
      - generic [ref=e60]:
        - img "Avatar for Assistant" [ref=e63]
        - generic [ref=e263]:
          - article [ref=e264]: "[研究报告]"
          - article [ref=e265]: 好的，作为一名研究助手，我已根据您提供的子问题发现，整合并生成了以下结构化的研究报告。
          - heading "关于2023-2025年间大型语言模型智能体（LLM Agent）的研究脉络与趋势分析报告" [level=3] [ref=e266]
          - article [ref=e267]: 本报告基于对2023-2025年间关键文献的梳理，旨在构建LLM Agent领域的研究脉络框架，总结核心进展，并展望未来趋势。
          - heading "1. 研究脉络总览：从自动化工具到自主智能体" [level=4] [ref=e268]
          - article [ref=e269]: 近年来，LLM Agent的研究经历了显著的范式转变。早期的研究多将LLM视为完成特定任务的工具，而当前的研究前沿已将其定位为具有自主性、协作性和拟人行为的智能体。这一演变在综述文献中得到了清晰的阐述。
          - list [ref=e270]:
            - listitem [ref=e271]:
              - text: "核心框架：EMNLP 2025的综述《From Automation to Autonomy: A Survey on Large Language Models in Scientific Discovery》提出了一个极具影响力的三级分类法，精准概括了这一发展路径："
              - list [ref=e272]:
                - listitem [ref=e273]: 工具级：执行预定义、任务特定的自动化流程。
                - listitem [ref=e274]: 分析员级：进行数据解释、模式识别和初步推理。
                - listitem [ref=e275]: 科学家级：具备高阶自主性，能主动提出假设、设计并执行实验循环。
          - article [ref=e276]: 这一框架不仅适用于科学发现领域，也为理解LLM Agent的通用能力演进提供了宏观视角。
          - heading "2. 核心研究方向与关键进展" [level=4] [ref=e277]
          - article [ref=e278]: 当前研究围绕智能体的构建、评估、优化和应用等多个维度展开，涌现出一批标志性工作。
          - heading "2.1 智能体架构与自主性增强" [level=5] [ref=e279]
          - article [ref=e280]: 研究重点从设计单一智能体的工作流，扩展到构建复杂多智能体协作系统，以解决更宏大的问题。
          - list [ref=e281]:
            - listitem [ref=e282]:
              - text: 多智能体协作框架：
              - code [ref=e283]: AutoML-Agent
              - text: (ICML 2025) 展示了多LLM智能体在自动化机器学习全流程中分工协作的潜力，是智能体应用于复杂系统工程的代表。
            - listitem [ref=e284]:
              - text: 专业化自主智能体：
              - code [ref=e285]: RepoAudit
              - text: (ICML 2025) 专注于代码审计领域，体现了智能体在垂直领域实现深度自主任务的可行性。
            - listitem [ref=e286]: 扩展性研究：《Scaling Autonomous Agents via Automatic Reward Modeling And Planning》(ICLR 2025) 则从方法论层面，探讨了通过自动奖励建模和规划来提升智能体规模与性能的路径。
          - heading "2.2 评估与基准测试" [level=5] [ref=e287]
          - article [ref=e288]: 随着智能体行为日趋复杂，其评估标准已超越简单的任务完成度，转向对其理性、社会性和可靠性的深度衡量。
          - list [ref=e289]:
            - listitem [ref=e290]:
              - text: 经济理性评估：
              - code [ref=e291]: STEER
              - text: (ICML 2024) 基准专门用于评估LLM智能体在决策中是否遵循经济理性原则。
            - listitem [ref=e292]:
              - text: 社会行为模拟：《Can Large Language Models Agents Simulate Human Trust Behavior?》(NeurIPS 2024) 和
              - code [ref=e293]: Collab-Overcooked
              - text: (EMNLP 2025) 分别探究了智能体模拟人类信任行为和多智能体在动态环境中的协作能力。
            - listitem [ref=e294]: "事实性与可靠性：《Position: Uncertainty Quantification Needs Reassessment for Large Language Model Agents》(ICML 2025) 的立场论文强调，对智能体输出的不确定性进行量化评估至关重要，这直接关系到其部署的可靠性。"
          - heading "2.3 训练与优化方法" [level=5] [ref=e295]
          - article [ref=e296]: 为了克服在线交互训练的成本与风险，研究者正在探索更高效的训练范式。
          - list [ref=e297]:
            - listitem [ref=e298]: 离线训练新范式：《Offline Training of Language Model Agents with Functions as Learnable Weights》(ICML 2024) 提出了一种创新方法，将工具函数作为可学习权重进行离线训练，而无需修改LLM本体参数，为提高训练效率和安全提供了新思路。
          - heading "2.4 多样化应用探索" [level=5] [ref=e299]
          - article [ref=e300]: 智能体的应用场景正迅速从数字世界拓展至对社会系统的模拟。
          - list [ref=e301]:
            - listitem [ref=e302]: 城市与社会模拟：《Large Language Models as Urban Residents》(NeurIPS 2024) 构建了用于生成个人移动行为的LLM智能体框架，开启了基于Agent的社会计算研究。
            - listitem [ref=e303]: 模型开放性探讨：《Open Models, Closed Minds?》(AAAI 2025) 则从另一角度，研究了开源模型在模拟人类个性与认知方面的潜力与局限。
          - heading "3. 研究趋势总结与未来展望" [level=4] [ref=e304]
          - heading "3.1 当前研究趋势" [level=5] [ref=e305]
          - list [ref=e306]:
            - listitem [ref=e307]: 自主性层级化：研究关注点正沿着“工具 → 分析员 → 科学家”的自主性阶梯向上迁移，追求更高阶的认知与决策能力。
            - listitem [ref=e308]: 交互模式复杂化：从单智能体任务求解转向多智能体协作与竞争，研究重点包括通信、协调与涌现行为。
            - listitem [ref=e309]: 评估维度人本化：评估标准从性能导向转向行为与价值观导向，如理性、信任、协作和公平性。
            - listitem [ref=e310]: 训练方法高效化：探索离线训练、轻量化微调等方法，以降低对大规模在线交互的依赖，提升训练安全与可控性。
          - heading "3.2 潜在的研究空白与未来方向" [level=5] [ref=e311]
          - article [ref=e312]: 基于现有脉络，以下方向可能代表未来的研究重点或当前存在的空白：
          - list [ref=e313]:
            - listitem [ref=e314]: 长期记忆与持续学习：当前智能体多为“任务重置”型，缺乏真正意义上的跨任务、跨会话的长期记忆和持续学习能力，这限制了其在长期交互和个性化适应中的应用。
            - listitem [ref=e315]: 内在动机与目标生成：大多数智能体仍由人类预设目标驱动。如何让智能体具备自我设定合理子目标、产生内在探索动机的能力，是实现“科学家”级自主性的关键。
            - listitem [ref=e316]: 复杂物理与社会环境中的具身交互：尽管已有城市模拟等研究，但智能体在复杂、动态且部分可观测的物理环境或开放域社会环境中的具身推理与交互，仍是巨大挑战。
            - listitem [ref=e317]: 可解释性与对齐的深化：随着智能体自主性增强，其决策过程将更复杂。发展适用于多步骤、多智能体决策的可解释性技术，并确保其与复杂人类价值观的长期对齐，是安全部署的前提。
            - listitem [ref=e318]: 评估基准的整合与统一：现有评估基准（如经济理性、协作、信任）相对分散。未来可能需要一个多维度的、统一的评估框架，以全面衡量智能体的“智能”与“适应性”。
          - article [ref=e319]: 结论：2023-2025年间，LLM Agent研究已形成一个清晰、快速演进的发展脉络，其核心是从被动工具演变为具有自主性和社会属性的智能体。未来研究将在提升智能体高阶认知能力、解决复杂环境交互以及确保其安全、可靠、符合伦理的方向上持续深化。
