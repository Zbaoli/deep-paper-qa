          - article [ref=e140]: 基于两次检索结果，我建立了关于2023-2025年间LLM Agent研究的初步框架：
          - heading "1. 综述类文献" [level=3] [ref=e141]
          - list [ref=e142]:
            - listitem [ref=e143]: "EMNLP 2025: \"From Automation to Autonomy: A Survey on Large Language Models in Scientific Discovery\" - 这篇综述系统地描述了LLM在科学发现中从工具到分析员再到科学家的角色演变，提出了三级分类法（Tool, Analyst, Scientist），是理解LLM Agent自主性发展的关键框架。"
            - listitem [ref=e144]: "EMNLP 2023: \"How Do Large Language Models Capture the Ever-changing World Knowledge? A Review of Recent Advances\" - 虽然主要关注知识更新，但为理解LLM Agent的知识基础提供了背景。"
          - heading "2. 关键论文与研究方向" [level=3] [ref=e145]
          - article [ref=e146]: a. 自主性与框架设计
          - list [ref=e147]:
            - listitem [ref=e148]: "AutoML-Agent (ICML 2025): 多智能体LLM框架，用于全流程AutoML，展示了多智能体协作的潜力"
            - listitem [ref=e149]: "RepoAudit (ICML 2025): 用于代码审计的自主LLM智能体"
            - listitem [ref=e150]: "Scaling Autonomous Agents via Automatic Reward Modeling And Planning (ICLR 2025): 通过自动奖励建模和规划扩展自主智能体"
          - article [ref=e151]: b. 评估与基准
          - list [ref=e152]:
            - listitem [ref=e153]: "STEER (ICML 2024): 评估LLM智能体的经济理性"
            - listitem [ref=e154]: "Can Large Language Models Agents Simulate Human Trust Behavior? (NeurIPS 2024): 研究LLM智能体模拟人类信任行为的能力"
            - listitem [ref=e155]: "Collab-Overcooked (EMNLP 2025): 评估LLM作为协作智能体的基准"
          - article [ref=e156]: c. 训练与优化
          - list [ref=e157]:
            - listitem [ref=e158]: "Offline Training of Language Model Agents with Functions as Learnable Weights (ICML 2024): 不修改LLM权重的智能体训练新范式"
            - listitem [ref=e159]: "Position: Uncertainty Quantification Needs Reassessment for Large Language Model Agents (ICML 2025): 强调不确定性量化的重要性"
          - article [ref=e160]: d. 应用领域
