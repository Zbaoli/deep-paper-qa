          - heading "3. 核心概念框架" [level=3] [ref=e365]
          - article [ref=e366]: 从检索结果可以看出，LLM Agent 研究主要围绕以下核心概念展开：
          - list [ref=e367]:
            - listitem [ref=e368]: 架构设计：多智能体系统架构、框架设计
            - listitem [ref=e369]: 反馈机制：Agent 与环境、用户的交互反馈
            - listitem [ref=e370]: 记忆与规划：Agent 的记忆系统和规划能力
