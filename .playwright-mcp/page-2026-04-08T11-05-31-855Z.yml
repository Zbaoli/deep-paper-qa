          - heading "4. 研究趋势" [level=3] [ref=e375]
          - list [ref=e376]:
            - listitem [ref=e377]: 时间分布：2024-2025 年是 LLM Agent 研究的高峰期
            - listitem [ref=e378]: 会议分布：主要发表在 NeurIPS、ICML、ICLR、IJCAI、AAAI 等顶级会议
