          - article [ref=e143]: 基于对2023-2025年间LLM Agent相关文献的检索，我建立了以下研究脉络的初步框架：
          - heading "一、综述文献" [level=3] [ref=e144]
          - list [ref=e145]:
            - listitem [ref=e146]:
              - text: 《A Survey on the Feedback Mechanism of LLM-based AI Agents》 (IJCAI 2025)
              - list [ref=e147]:
                - listitem [ref=e148]: 系统综述了LLM-based AI agents的反馈机制
                - listitem [ref=e149]: 提出了一个通用框架，涵盖现有大部分工作
                - listitem [ref=e150]: 将反馈机制分类并提供了该领域的全面概览
          - heading "二、关键论文和核心概念" [level=3] [ref=e151]
          - heading "1. 评估基准与框架" [level=4] [ref=e152]
          - list [ref=e153]:
            - listitem [ref=e154]: AgentBench (ICLR 2024, 引用40)：首个多维度的LLM-as-Agent评估基准，包含8个不同环境
            - listitem [ref=e155]: InfiAgent-DABench (ICML 2024)：专门评估数据分析任务的LLM-based agents基准
            - listitem [ref=e156]: ALI-Agent (NeurIPS 2024)：基于agent的评估框架，用于评估LLM与人类价值观的对齐
          - heading "2. 架构设计与关键技术" [level=4] [ref=e157]
          - list [ref=e158]:
            - listitem [ref=e159]: Multi-agent Architecture Search via Agentic Supernet (ICML 2025)：提出了agentic supernet概念，优化agent架构的概率分布
            - listitem [ref=e160]: Offline Training of Language Model Agents with Functions as Learnable Weights (ICML 2024)：将函数作为可学习的"agent参数"进行训练
            - listitem [ref=e161]: AutoML-Agent (ICML 2025)：用于全流程AutoML的多agent LLM框架
          - heading "3. 应用场景" [level=4] [ref=e162]
          - list [ref=e163]:
            - listitem [ref=e164]: 数学建模：MM-Agent (NeurIPS 2025) 用于解决现实世界数学建模问题
            - listitem [ref=e165]: 代码审计：RepoAudit (ICML 2025) 用于仓库级代码审计的自主LLM-agent
            - listitem [ref=e166]: 城市移动性：LLM Agent框架用于个人移动性生成 (NeurIPS 2024)
            - listitem [ref=e167]: 信息传播模拟：LLM-enhanced Agent-based Simulation Tool (IJCAI 2024)
          - heading "4. 安全与可靠性" [level=4] [ref=e168]
          - list [ref=e169]:
            - listitem [ref=e170]: Watch Out for Your Agents! Investigating Backdoor Threats to LLM-Based Agents (NeurIPS 2024)：首次系统研究LLM-based agents的后门攻击威胁
            - listitem [ref=e171]: "Position: Uncertainty Quantification Needs Reassessment for Large Language Model Agents (ICML 2025)：重新评估LLM agents的不确定性量化需求"
          - heading "三、研究趋势" [level=3] [ref=e172]
