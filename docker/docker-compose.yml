# Deep Paper QA - 统一容器编排
# PostgreSQL (论文元数据) + RAGFlow 全套 (向量知识库)
#
# 启动: docker compose up -d
# 停止: docker compose down

services:
  # ============================================================
  # PostgreSQL - 论文元数据存储
  # ============================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dpqa-postgres
    environment:
      POSTGRES_DB: paper_research
      POSTGRES_USER: paper
      POSTGRES_PASSWORD: paper123
    ports:
      - "${PG_PORT:-10001}:5432"
    volumes:
      - docker_postgres_data:/var/lib/postgresql/data
    networks:
      - dpqa
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paper -d paper_research"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ============================================================
  # RAGFlow 依赖：MySQL
  # ============================================================
  ragflow-mysql:
    image: mysql:8.0.39
    container_name: dpqa-ragflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${RAGFLOW_MYSQL_PASSWORD:-infini_rag_flow}
    command:
      --max_connections=1000
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --tls_version="TLSv1.2,TLSv1.3"
      --init-file=/data/application/init.sql
      --binlog_expire_logs_seconds=604800
      --max_allowed_packet=1073741824
    ports:
      - "${RAGFLOW_MYSQL_PORT:-10011}:3306"
    volumes:
      - ragflow_mysql_data:/var/lib/mysql
      - ./init-ragflow-mysql.sql:/data/application/init.sql:ro
    networks:
      - dpqa
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-p${RAGFLOW_MYSQL_PASSWORD:-infini_rag_flow}"]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped

  # ============================================================
  # RAGFlow 依赖：Elasticsearch
  # ============================================================
  ragflow-es:
    image: elasticsearch:8.11.3
    container_name: dpqa-ragflow-es
    environment:
      - node.name=es01
      - ELASTIC_PASSWORD=${RAGFLOW_ES_PASSWORD:-infini_rag_flow}
      - bootstrap.memory_lock=false
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - cluster.routing.allocation.disk.watermark.low=5gb
      - cluster.routing.allocation.disk.watermark.high=3gb
      - cluster.routing.allocation.disk.watermark.flood_stage=2gb
    ports:
      - "${RAGFLOW_ES_PORT:-10012}:9200"
    volumes:
      - ragflow_es_data:/usr/share/elasticsearch/data
    networks:
      - dpqa
    mem_limit: 8073741824
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200"]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped

  # ============================================================
  # RAGFlow 依赖：MinIO (对象存储)
  # ============================================================
  ragflow-minio:
    image: quay.io/minio/minio:RELEASE.2025-06-13T11-33-47Z
    container_name: dpqa-ragflow-minio
    command: ["server", "--console-address", ":9001", "/data"]
    environment:
      MINIO_ROOT_USER: rag_flow
      MINIO_ROOT_PASSWORD: ${RAGFLOW_MINIO_PASSWORD:-infini_rag_flow}
    ports:
      - "${RAGFLOW_MINIO_API_PORT:-10013}:9000"
      - "${RAGFLOW_MINIO_CONSOLE_PORT:-10014}:9001"
    volumes:
      - ragflow_minio_data:/data
    networks:
      - dpqa
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped

  # ============================================================
  # RAGFlow 依赖：Redis (Valkey)
  # ============================================================
  ragflow-redis:
    image: valkey/valkey:8
    container_name: dpqa-ragflow-redis
    command: ["redis-server", "--requirepass", "${RAGFLOW_REDIS_PASSWORD:-infini_rag_flow}", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${RAGFLOW_REDIS_PORT:-10015}:6379"
    volumes:
      - ragflow_redis_data:/data
    networks:
      - dpqa
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${RAGFLOW_REDIS_PASSWORD:-infini_rag_flow}", "ping"]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: unless-stopped

  # ============================================================
  # RAGFlow 主服务
  # ============================================================
  ragflow:
    image: infiniflow/ragflow:v0.24.0
    container_name: dpqa-ragflow
    depends_on:
      ragflow-mysql:
        condition: service_healthy
      ragflow-es:
        condition: service_healthy
      ragflow-minio:
        condition: service_healthy
      ragflow-redis:
        condition: service_healthy
    command:
      - --enable-adminserver
    ports:
      - "${RAGFLOW_WEB_PORT:-10003}:80"
      - "${RAGFLOW_API_PORT:-10004}:9380"
      - "${RAGFLOW_ADMIN_PORT:-10005}:9381"
    volumes:
      - ./ragflow-logs:/ragflow/logs
      - ./nginx/ragflow.conf:/etc/nginx/conf.d/ragflow.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf:ro
    environment:
      # 数据库连接（指向本 compose 内的服务）
      - MYSQL_HOST=ragflow-mysql
      - MYSQL_PORT=3306
      - MYSQL_PASSWORD=${RAGFLOW_MYSQL_PASSWORD:-infini_rag_flow}
      - MYSQL_DBNAME=rag_flow
      # Elasticsearch
      - ES_HOST=ragflow-es
      - ELASTIC_PASSWORD=${RAGFLOW_ES_PASSWORD:-infini_rag_flow}
      # MinIO
      - MINIO_HOST=ragflow-minio
      - MINIO_USER=rag_flow
      - MINIO_PASSWORD=${RAGFLOW_MINIO_PASSWORD:-infini_rag_flow}
      # Redis
      - REDIS_HOST=ragflow-redis
      - REDIS_PASSWORD=${RAGFLOW_REDIS_PASSWORD:-infini_rag_flow}
      # 其他
      - DOC_ENGINE=elasticsearch
      - TZ=Asia/Shanghai
      - DOC_BULK_SIZE=4
      - EMBEDDING_BATCH_SIZE=16
      - THREAD_POOL_MAX_WORKERS=128
      - REGISTER_ENABLED=1
      - API_PROXY_SCHEME=python
      - MACOS=1
      - NO_PROXY=localhost,127.0.0.1,::1,.local,host.docker.internal,ragflow-mysql,ragflow-es,ragflow-minio,ragflow-redis
      - no_proxy=localhost,127.0.0.1,::1,.local,host.docker.internal,ragflow-mysql,ragflow-es,ragflow-minio,ragflow-redis
    networks:
      - dpqa
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  docker_postgres_data:
    external: true
  ragflow_mysql_data:
  ragflow_es_data:
  ragflow_minio_data:
  ragflow_redis_data:

networks:
  dpqa:
    driver: bridge
