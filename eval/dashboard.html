<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Eval Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface-2: #1a1e28;
    --surface-3: #222733;
    --border: #2a3040;
    --text: #c8cdd8;
    --text-dim: #6b7280;
    --text-bright: #e8ecf4;
    --accent: #3b82f6;
    --accent-dim: #1e3a5f;
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.12);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,0.12);
    --sql-color: #818cf8;
    --content-color: #34d399;
    --mixed-color: #fb923c;
    --trend-color: #60a5fa;
    --research-color: #a78bfa;
    --reject-color: #6b7280;
    --mono: 'IBM Plex Mono', 'Menlo', monospace;
    --sans: 'IBM Plex Sans', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* Top bar */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,12,16,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex; align-items: center; gap: 20px;
  }
  .topbar h1 {
    font-family: var(--mono);
    font-size: 15px; font-weight: 500;
    color: var(--text-bright);
    letter-spacing: -0.3px;
  }
  .topbar h1 span { color: var(--accent); }
  .topbar .meta {
    font-family: var(--mono);
    font-size: 12px; color: var(--text-dim);
  }
  .topbar .tabs {
    margin-left: auto;
    display: flex; gap: 4px;
  }
  .topbar .tab {
    padding: 6px 14px;
    font-family: var(--mono); font-size: 12px;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .topbar .tab:hover { color: var(--text); background: var(--surface-2); }
  .topbar .tab.active {
    color: var(--text-bright);
    background: var(--surface-2);
    border-color: var(--border);
  }

  /* Layout */
  .container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }

  .panel { display: none; }
  .panel.active { display: block; }

  /* KPI cards */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }
  .kpi::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .kpi.blue::before { background: var(--accent); }
  .kpi.green::before { background: var(--green); }
  .kpi.amber::before { background: var(--amber); }
  .kpi.red::before { background: var(--red); }
  .kpi.purple::before { background: var(--sql-color); }
  .kpi-label {
    font-size: 11px; font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .kpi-value {
    font-family: var(--mono);
    font-size: 28px; font-weight: 600;
    color: var(--text-bright);
    line-height: 1;
  }
  .kpi-sub {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* Section */
  .section {
    margin-bottom: 24px;
  }
  .section-title {
    font-family: var(--mono);
    font-size: 12px; font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* Type breakdown grid */
  .type-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .type-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .type-card .type-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .type-badge {
    font-family: var(--mono);
    font-size: 11px; font-weight: 600;
    padding: 3px 10px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .type-badge.sql { background: rgba(129,140,248,0.15); color: var(--sql-color); }
  .type-badge.content { background: rgba(52,211,153,0.15); color: var(--content-color); }
  .type-badge.mixed { background: rgba(251,146,60,0.15); color: var(--mixed-color); }
  .type-badge.trend { background: rgba(96,165,250,0.15); color: var(--trend-color); }
  .type-badge.research { background: rgba(167,139,250,0.15); color: var(--research-color); }
  .type-badge.reject { background: rgba(107,114,128,0.15); color: var(--reject-color); }

  .type-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .type-stat-label { font-size: 11px; color: var(--text-dim); }
  .type-stat-value { font-family: var(--mono); font-size: 18px; font-weight: 600; color: var(--text-bright); }

  /* Bar chart */
  .bar-chart { display: flex; flex-direction: column; gap: 6px; }
  .bar-row {
    display: grid;
    grid-template-columns: 40px 1fr 50px;
    align-items: center;
    gap: 10px;
  }
  .bar-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
  }
  .bar-track {
    height: 22px;
    background: var(--surface-2);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .bar-value {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  /* Score distribution */
  .score-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
    gap: 4px;
  }
  .score-cell {
    aspect-ratio: 1;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    border: 1px solid transparent;
  }
  .score-cell:hover {
    transform: scale(1.08);
    z-index: 2;
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(59,130,246,0.2);
  }
  .score-cell .q-id { font-size: 10px; color: rgba(255,255,255,0.5); }
  .score-cell .q-score { font-size: 16px; font-weight: 600; }

  /* Table */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .data-table th {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 52px;
    background: var(--bg);
    cursor: pointer;
  }
  .data-table th:hover { color: var(--text); }
  .data-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--surface-2);
    vertical-align: top;
  }
  .data-table tr { transition: background 0.15s; }
  .data-table tr:hover { background: var(--surface); }
  .data-table tr.selected { background: var(--accent-dim); }

  .routing-ok { color: var(--green); }
  .routing-fail { color: var(--red); }

  .pill {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px; font-weight: 500;
    padding: 2px 8px;
    border-radius: 3px;
  }
  .pill-sql { background: rgba(129,140,248,0.15); color: var(--sql-color); }
  .pill-content { background: rgba(52,211,153,0.15); color: var(--content-color); }
  .pill-mixed { background: rgba(251,146,60,0.15); color: var(--mixed-color); }
  .pill-trend { background: rgba(96,165,250,0.15); color: var(--trend-color); }
  .pill-research { background: rgba(167,139,250,0.15); color: var(--research-color); }
  .pill-reject { background: rgba(107,114,128,0.15); color: var(--reject-color); }

  .score-badge {
    font-family: var(--mono);
    font-size: 12px; font-weight: 600;
    padding: 2px 8px; border-radius: 4px;
  }

  .tools-list {
    display: flex; flex-wrap: wrap; gap: 3px;
  }
  .tool-chip {
    font-family: var(--mono);
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--surface-3);
    color: var(--text-dim);
    white-space: nowrap;
  }

  /* Detail panel */
  .detail-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
  }
  .detail-overlay.open { display: flex; justify-content: center; align-items: start; padding: 40px 20px; overflow-y: auto; }

  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 1000px;
    animation: slideUp 0.25s ease-out;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .detail-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: start; gap: 16px;
  }
  .detail-header .close-btn {
    margin-left: auto;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    transition: all 0.15s;
  }
  .detail-header .close-btn:hover { color: var(--text-bright); background: var(--surface-3); }

  .detail-body { padding: 24px; }

  .detail-scores {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .detail-score-card {
    background: var(--surface-2);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .detail-score-card .dim-name {
    font-size: 10px; text-transform: uppercase;
    color: var(--text-dim); letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .detail-score-card .dim-score {
    font-family: var(--mono);
    font-size: 22px; font-weight: 600;
  }

  .detail-section {
    margin-top: 20px;
  }
  .detail-section-title {
    font-family: var(--mono);
    font-size: 11px; font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }

  .detail-content {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
    line-height: 1.7;
    max-height: 400px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .detail-content::-webkit-scrollbar { width: 6px; }
  .detail-content::-webkit-scrollbar-track { background: transparent; }
  .detail-content::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }

  .tool-output-block {
    margin-bottom: 12px;
    border-left: 2px solid var(--accent);
    padding-left: 12px;
  }
  .tool-output-block .tool-name {
    font-family: var(--mono);
    font-size: 11px; font-weight: 600;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .tool-output-block .tool-input {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .tool-output-block .tool-result {
    font-size: 12px;
    color: var(--text);
    background: var(--surface-2);
    border-radius: 4px;
    padding: 10px;
    max-height: 200px;
    overflow-y: auto;
  }

  /* Redundancy chart */
  .redundancy-row {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 0;
    border-bottom: 1px solid var(--surface-2);
  }
  .redundancy-row:last-child { border-bottom: none; }
  .call-dot {
    width: 22px; height: 22px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 9px; font-weight: 600;
  }
  .call-dot.execute_sql { background: rgba(129,140,248,0.2); color: var(--sql-color); }
  .call-dot.search_abstracts { background: rgba(52,211,153,0.2); color: var(--content-color); }
  .call-dot.vector_search { background: rgba(251,146,60,0.2); color: var(--mixed-color); }

  /* Filters */
  .filter-row {
    display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .filter-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .filter-btn.active { color: var(--text-bright); background: var(--surface-2); border-color: var(--accent); }

  /* Heatmap legend */
  .legend {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 12px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 4px;
    font-family: var(--mono); font-size: 10px; color: var(--text-dim);
  }
  .legend-swatch {
    width: 12px; height: 12px; border-radius: 3px;
  }

  /* Two column layout */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1><span>//</span> Agent Eval Dashboard</h1>
  <div class="meta">deep_paper_qa &middot; 65 questions</div>
  <div class="tabs">
    <button class="tab active" data-panel="overview">Overview</button>
    <button class="tab" data-panel="heatmap">Heatmap</button>
    <button class="tab" data-panel="table">All Questions</button>
    <button class="tab" data-panel="redundancy">Redundancy</button>
  </div>
</div>

<div class="container">
  <!-- Overview Panel -->
  <div class="panel active" id="panel-overview">
    <div class="kpi-row fade-in" id="kpi-row"></div>

    <div class="section fade-in">
      <div class="section-title">By Question Type</div>
      <div class="type-grid" id="type-grid"></div>
    </div>

    <div class="two-col fade-in">
      <div class="section">
        <div class="section-title">Quality Distribution (4 Dimensions)</div>
        <div id="dim-bars"></div>
      </div>
      <div class="section">
        <div class="section-title">Tool Call Frequency</div>
        <div id="tool-bars"></div>
      </div>
    </div>
  </div>

  <!-- Heatmap Panel -->
  <div class="panel" id="panel-heatmap">
    <div class="section fade-in">
      <div class="section-title">Quality Score Heatmap</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-swatch" style="background:#991b1b"></div> 1.0</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#dc2626"></div> 2.0</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#f59e0b"></div> 3.0</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#22c55e"></div> 4.0</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#15803d"></div> 5.0</div>
      </div>
      <div class="filter-row" id="heatmap-filters"></div>
      <div class="score-grid" id="score-grid"></div>
    </div>
  </div>

  <!-- Table Panel -->
  <div class="panel" id="panel-table">
    <div class="filter-row" id="table-filters"></div>
    <div style="overflow-x:auto;">
      <table class="data-table" id="data-table">
        <thead>
          <tr>
            <th data-sort="id">#</th>
            <th data-sort="type">Type</th>
            <th data-sort="question">Question</th>
            <th data-sort="tool_routing_correct">Routing</th>
            <th data-sort="tool_call_count">Calls</th>
            <th data-sort="overall">Quality</th>
            <th data-sort="efficiency">Efficiency</th>
            <th>Tools</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Redundancy Panel -->
  <div class="panel" id="panel-redundancy">
    <div class="section fade-in">
      <div class="section-title">Tool Call Sequences (>2 calls)</div>
      <div id="redundancy-chart"></div>
    </div>
  </div>
</div>

<!-- Detail overlay -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-panel" id="detail-panel"></div>
</div>

<script>
let DATA = [];
let currentFilter = 'all';
let sortCol = 'id';
let sortAsc = true;

async function loadData() {
  const resp = await fetch('eval_results.json');
  DATA = await resp.json();
  renderAll();
}

function scoreColor(score) {
  if (score >= 4.5) return '#15803d';
  if (score >= 4.0) return '#22c55e';
  if (score >= 3.5) return '#84cc16';
  if (score >= 3.0) return '#f59e0b';
  if (score >= 2.0) return '#dc2626';
  return '#991b1b';
}

function scoreBg(score) {
  if (score >= 4.5) return 'rgba(21,128,61,0.2)';
  if (score >= 4.0) return 'rgba(34,197,94,0.2)';
  if (score >= 3.5) return 'rgba(132,204,22,0.15)';
  if (score >= 3.0) return 'rgba(245,158,11,0.15)';
  if (score >= 2.0) return 'rgba(220,38,38,0.15)';
  return 'rgba(153,27,27,0.2)';
}

function typeClass(type) {
  return { sql: 'pill-sql', content: 'pill-content', mixed: 'pill-mixed', trend: 'pill-trend', research: 'pill-research', reject: 'pill-reject' }[type] || '';
}

function renderAll() {
  renderKPIs();
  renderTypeGrid();
  renderDimBars();
  renderToolBars();
  renderHeatmap();
  renderTable();
  renderRedundancy();
}

function renderKPIs() {
  const total = DATA.length;
  const correct = DATA.filter(r => r.tool_routing_correct).length;
  const scored = DATA.filter(r => r.quality_scores);
  const avgQ = scored.length ? (scored.reduce((s,r) => s + r.quality_scores.overall, 0) / scored.length).toFixed(2) : '—';
  const avgCalls = (DATA.reduce((s,r) => s + r.tool_call_count, 0) / total).toFixed(1);
  const lowCount = scored.filter(r => r.quality_scores.overall < 3).length;

  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi blue"><div class="kpi-label">Questions</div><div class="kpi-value">${total}</div><div class="kpi-sub">sql:${DATA.filter(r=>r.type==='sql').length} content:${DATA.filter(r=>r.type==='content').length} mixed:${DATA.filter(r=>r.type==='mixed').length}</div></div>
    <div class="kpi green"><div class="kpi-label">Routing Correct</div><div class="kpi-value">${correct}/${total}</div><div class="kpi-sub">${(correct/total*100).toFixed(1)}%</div></div>
    <div class="kpi purple"><div class="kpi-label">Avg Quality</div><div class="kpi-value">${avgQ}</div><div class="kpi-sub">/ 5.00</div></div>
    <div class="kpi amber"><div class="kpi-label">Avg Calls</div><div class="kpi-value">${avgCalls}</div><div class="kpi-sub">per question</div></div>
    <div class="kpi red"><div class="kpi-label">Low Score (&lt;3)</div><div class="kpi-value">${lowCount}</div><div class="kpi-sub">${(lowCount/total*100).toFixed(1)}% of total</div></div>
    <div class="kpi blue"><div class="kpi-label">Avg Efficiency</div><div class="kpi-value">${scored.length && scored[0].quality_scores.efficiency ? (scored.reduce((s,r) => s + (r.quality_scores.efficiency?.score||0), 0) / scored.length).toFixed(2) : '—'}</div><div class="kpi-sub">/ 5.00</div></div>
  `;
}

function renderTypeGrid() {
  const types = ['sql', 'content', 'mixed', 'trend', 'research', 'reject'];
  const html = types.map(t => {
    const items = DATA.filter(r => r.type === t);
    const correct = items.filter(r => r.tool_routing_correct).length;
    const scored = items.filter(r => r.quality_scores);
    const avgQ = scored.length ? (scored.reduce((s,r) => s + r.quality_scores.overall, 0) / scored.length).toFixed(2) : '—';
    const avgC = (items.reduce((s,r) => s + r.tool_call_count, 0) / items.length).toFixed(1);
    return `
      <div class="type-card">
        <div class="type-header">
          <span class="type-badge ${t}">${t}</span>
          <span style="font-family:var(--mono);font-size:12px;color:var(--text-dim)">${items.length} questions</span>
        </div>
        <div class="type-stats">
          <div><div class="type-stat-label">Routing</div><div class="type-stat-value">${correct}/${items.length}</div></div>
          <div><div class="type-stat-label">Avg Quality</div><div class="type-stat-value" style="color:${scoreColor(parseFloat(avgQ))}">${avgQ}</div></div>
          <div><div class="type-stat-label">Avg Calls</div><div class="type-stat-value">${avgC}</div></div>
          <div><div class="type-stat-label">Efficiency</div><div class="type-stat-value">${scored.length && scored[0].quality_scores.efficiency ? (scored.reduce((s,r) => s + (r.quality_scores.efficiency?.score||0), 0) / scored.length).toFixed(2) : '—'}</div></div>
          <div><div class="type-stat-label">Low Score</div><div class="type-stat-value" style="color:var(--red)">${scored.filter(r=>r.quality_scores.overall<3).length}</div></div>
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('type-grid').innerHTML = html;
}

function renderDimBars() {
  const dims = ['accuracy', 'completeness', 'citation', 'clarity', 'efficiency'];
  const scored = DATA.filter(r => r.quality_scores);
  const html = dims.map(dim => {
    const avg = scored.reduce((s,r) => s + r.quality_scores[dim].score, 0) / scored.length;
    const pct = avg / 5 * 100;
    return `
      <div class="bar-row">
        <div class="bar-label">${dim.slice(0,4)}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${scoreColor(avg)}"></div>
        </div>
        <div class="bar-value">${avg.toFixed(2)}</div>
      </div>
    `;
  }).join('');
  document.getElementById('dim-bars').innerHTML = `<div class="bar-chart">${html}</div>`;
}

function renderToolBars() {
  const tools = {};
  DATA.forEach(r => r.tools_called.forEach(t => { tools[t] = (tools[t]||0) + 1; }));
  const sorted = Object.entries(tools).sort((a,b) => b[1] - a[1]);
  const max = sorted[0]?.[1] || 1;
  const colors = { execute_sql: 'var(--sql-color)', search_abstracts: 'var(--content-color)', vector_search: 'var(--mixed-color)' };
  const html = sorted.map(([name, count]) => `
    <div class="bar-row">
      <div class="bar-label">${name.replace('execute_','').replace('search_','s_').replace('vector_','v_')}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${count/max*100}%;background:${colors[name]||'var(--accent)'}"></div>
      </div>
      <div class="bar-value">${count}</div>
    </div>
  `).join('');
  document.getElementById('tool-bars').innerHTML = `<div class="bar-chart">${html}</div>`;
}

function renderHeatmap() {
  // Filters
  const filterHtml = ['all','sql','content','mixed','trend','research','reject'].map(f =>
    `<button class="filter-btn ${currentFilter===f?'active':''}" data-filter="${f}">${f}</button>`
  ).join('');
  document.getElementById('heatmap-filters').innerHTML = filterHtml;

  const filtered = currentFilter === 'all' ? DATA : DATA.filter(r => r.type === currentFilter);
  const html = filtered.map(r => {
    const score = r.quality_scores?.overall || 0;
    const bg = scoreBg(score);
    const color = scoreColor(score);
    return `
      <div class="score-cell" style="background:${bg}" data-id="${r.id}" onclick="showDetail(${r.id})">
        <div class="q-id">Q${r.id}</div>
        <div class="q-score" style="color:${color}">${score.toFixed(1)}</div>
      </div>
    `;
  }).join('');
  document.getElementById('score-grid').innerHTML = html;
}

function renderTable() {
  // Filters
  const filterHtml = ['all','sql','content','mixed','trend','research','reject','low (<3)','high calls (>4)','low efficiency (<3)'].map(f =>
    `<button class="filter-btn ${currentFilter===f?'active':''}" data-filter="${f}">${f}</button>`
  ).join('');
  document.getElementById('table-filters').innerHTML = filterHtml;

  let filtered = [...DATA];
  if (['sql', 'content', 'mixed', 'trend', 'research', 'reject'].includes(currentFilter)) {
    filtered = filtered.filter(r => r.type === currentFilter);
  } else if (currentFilter === 'low (<3)') {
    filtered = filtered.filter(r => r.quality_scores && r.quality_scores.overall < 3);
  } else if (currentFilter === 'high calls (>4)') {
    filtered = filtered.filter(r => r.tool_call_count > 4);
  } else if (currentFilter === 'low efficiency (<3)') {
    filtered = filtered.filter(r => r.quality_scores?.efficiency?.score != null && r.quality_scores.efficiency.score < 3);
  }

  filtered.sort((a, b) => {
    let va, vb;
    if (sortCol === 'overall') {
      va = a.quality_scores?.overall || 0;
      vb = b.quality_scores?.overall || 0;
    } else if (sortCol === 'efficiency') {
      va = a.quality_scores?.efficiency?.score || 0;
      vb = b.quality_scores?.efficiency?.score || 0;
    } else {
      va = a[sortCol]; vb = b[sortCol];
    }
    if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    if (typeof va === 'boolean') { va = va ? 1 : 0; vb = vb ? 1 : 0; }
    return sortAsc ? va - vb : vb - va;
  });

  const rows = filtered.map(r => {
    const score = r.quality_scores?.overall || 0;
    const toolsHtml = r.tools_called.map(t => `<span class="tool-chip">${t.replace('execute_','').replace('search_','s_').replace('vector_','v_')}</span>`).join('');
    return `
      <tr onclick="showDetail(${r.id})" style="cursor:pointer">
        <td style="font-family:var(--mono);color:var(--text-dim)">${r.id}</td>
        <td><span class="pill ${typeClass(r.type)}">${r.type}</span></td>
        <td style="max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(r.question)}</td>
        <td><span class="${r.tool_routing_correct ? 'routing-ok' : 'routing-fail'}">${r.tool_routing_correct ? 'OK' : 'FAIL'}</span></td>
        <td style="font-family:var(--mono);${r.tool_call_count > 4 ? 'color:var(--red)' : ''}">${r.tool_call_count}</td>
        <td><span class="score-badge" style="background:${scoreBg(score)};color:${scoreColor(score)}">${score.toFixed(2)}</span></td>
        <td>${(() => { const es = r.quality_scores?.efficiency?.score; return es != null ? `<span class="score-badge" style="background:${scoreBg(es)};color:${scoreColor(es)}">${es}</span>` : '—'; })()}</td>
        <td><div class="tools-list">${toolsHtml}</div></td>
      </tr>
    `;
  }).join('');
  document.getElementById('table-body').innerHTML = rows;
}

function renderRedundancy() {
  const high = DATA.filter(r => r.tool_call_count > 2).sort((a,b) => b.tool_call_count - a.tool_call_count);
  const abbr = { execute_sql: 'SQL', search_abstracts: 'FTS', vector_search: 'VEC' };
  const html = high.map(r => {
    const dots = r.tools_called.map(t => `<div class="call-dot ${t}" title="${t}">${abbr[t]||t.slice(0,3)}</div>`).join('');
    const score = r.quality_scores?.overall || 0;
    return `
      <div class="redundancy-row" style="cursor:pointer" onclick="showDetail(${r.id})">
        <span style="font-family:var(--mono);font-size:11px;color:var(--text-dim);width:36px">Q${r.id}</span>
        <span class="pill ${typeClass(r.type)}" style="width:56px;text-align:center">${r.type}</span>
        <div style="display:flex;gap:3px;flex:1">${dots}</div>
        <span class="score-badge" style="background:${scoreBg(score)};color:${scoreColor(score)};font-size:11px">${score.toFixed(1)}</span>
        <span style="font-family:var(--mono);font-size:11px;color:var(--text-dim);width:50px;text-align:right">${r.tool_call_count} calls</span>
      </div>
    `;
  }).join('');
  document.getElementById('redundancy-chart').innerHTML = html;
}

function showDetail(id) {
  const r = DATA.find(d => d.id === id);
  if (!r) return;

  const score = r.quality_scores?.overall || 0;
  const dims = ['accuracy', 'completeness', 'citation', 'clarity', 'efficiency', 'overall'];

  const scoresHtml = dims.map(d => {
    const s = d === 'overall' ? score : (r.quality_scores?.[d]?.score || 0);
    return `
      <div class="detail-score-card">
        <div class="dim-name">${d}</div>
        <div class="dim-score" style="color:${scoreColor(s)}">${typeof s === 'number' ? s.toFixed(d==='overall'?2:0) : s}</div>
      </div>
    `;
  }).join('');

  // 优先用 tool_outputs_full（完整），回退到 tool_details（可能截断）
  let toolContentHtml;
  const TOOL_NAMES = ['execute_sql', 'search_abstracts', 'vector_search'];
  if (r.tool_outputs_full) {
    // tool_outputs_full 格式: "[tool_name] output\n\n[tool_name] output..."
    // 只在 \n\n[已知工具名] 处切割，避免误切论文序号 [1] [2] 等
    const toolPattern = new RegExp(`\\n\\n(?=\\[(${TOOL_NAMES.join('|')})\\])`, 'g');
    const blocks = r.tool_outputs_full.split(toolPattern).filter(b => b && !TOOL_NAMES.includes(b));
    toolContentHtml = blocks.map((block, i) => {
      const match = block.match(/^\[([^\]]+)\]\s*([\s\S]*)$/);
      const name = match ? match[1] : 'unknown';
      const content = match ? match[2] : block;
      const input = r.tool_details[i] ? r.tool_details[i].input : '';
      return `
        <div class="tool-output-block">
          <div class="tool-name">${i+1}. ${escHtml(name)}</div>
          <div class="tool-input">${escHtml(input)}</div>
          <div class="tool-result">${escHtml(content)}</div>
        </div>
      `;
    }).join('');
  } else {
    toolContentHtml = r.tool_details.map((td, i) => `
      <div class="tool-output-block">
        <div class="tool-name">${i+1}. ${td.name}</div>
        <div class="tool-input">${escHtml(td.input)}</div>
        <div class="tool-result">${escHtml(td.output || 'N/A')}</div>
      </div>
    `).join('');
  }

  const judgeComment = r.quality_scores?.summary || '';

  document.getElementById('detail-panel').innerHTML = `
    <div class="detail-header">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <span style="font-family:var(--mono);font-size:20px;font-weight:600;color:var(--text-bright)">Q${r.id}</span>
          <span class="pill ${typeClass(r.type)}">${r.type}</span>
          <span class="${r.tool_routing_correct ? 'routing-ok' : 'routing-fail'}" style="font-family:var(--mono);font-size:12px">${r.tool_routing_correct ? 'ROUTING OK' : 'ROUTING FAIL'}</span>
        </div>
        <div style="font-size:15px;color:var(--text-bright)">${escHtml(r.question)}</div>
      </div>
      <button class="close-btn" onclick="closeDetail()">&times;</button>
    </div>
    <div class="detail-body">
      <div class="detail-scores">${scoresHtml}</div>
      ${r.quality_scores ? `<div style="background:var(--surface-2);border-radius:8px;padding:16px;margin-bottom:16px;font-size:12px;line-height:1.7">
        <div style="font-family:var(--mono);font-size:11px;font-weight:600;color:var(--amber);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px">Judge Evaluation</div>
        ${judgeComment ? `<div style="color:var(--text-bright);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)">${escHtml(judgeComment)}</div>` : ''}
        ${['accuracy','completeness','citation','clarity','efficiency'].map(dim => {
          const d = r.quality_scores[dim];
          if (!d) return '';
          return `<div style="margin-bottom:8px"><strong style="color:${scoreColor(d.score)}">${dim} (${d.score})</strong>: <span style="color:var(--text-dim)">${escHtml(d.reason || '')}</span></div>`;
        }).join('')}
      </div>` : ''}

      <div class="detail-section">
        <div class="detail-section-title">Tool Calls (${r.tool_call_count})</div>
        <div class="detail-content" style="max-height:none">${toolContentHtml}</div>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">Agent Answer (${r.answer_length} chars)</div>
        <div class="detail-content" style="max-height:none">${escHtml(r.full_answer || r.answer_preview)}</div>
      </div>
    </div>
  `;

  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
  });
});

// Filter delegation
document.addEventListener('click', e => {
  if (e.target.classList.contains('filter-btn')) {
    currentFilter = e.target.dataset.filter;
    renderHeatmap();
    renderTable();
  }
});

// Sort delegation
document.querySelectorAll('.data-table th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.sort;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    renderTable();
  });
});

// Close detail on overlay click
document.getElementById('detail-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDetail();
});

// ESC to close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

loadData();
</script>
</body>
</html>
